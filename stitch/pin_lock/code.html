<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MoneyLog - Secure Unlock</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f8f9fa",
                        "on-tertiary-fixed-variant": "#005236",
                        "on-tertiary-fixed": "#002113",
                        "surface-container-high": "#e7e8e9",
                        "on-surface-variant": "#464555",
                        "on-secondary-container": "#006172",
                        "error-container": "#ffdad6",
                        "on-surface": "#191c1d",
                        "on-background": "#191c1d",
                        "primary-fixed": "#e2dfff",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed": "#001f26",
                        "inverse-surface": "#2e3132",
                        "tertiary": "#005338",
                        "background": "#f8f9fa",
                        "surface-variant": "#e1e3e4",
                        "on-primary-fixed-variant": "#3323cc",
                        "tertiary-container": "#006e4b",
                        "on-primary-container": "#dad7ff",
                        "inverse-on-surface": "#f0f1f2",
                        "secondary-fixed-dim": "#4cd7f6",
                        "surface-container-low": "#f3f4f5",
                        "tertiary-fixed": "#6ffbbe",
                        "surface-dim": "#d9dadb",
                        "outline": "#777587",
                        "surface-tint": "#4d44e3",
                        "on-tertiary": "#ffffff",
                        "primary": "#3525cd",
                        "surface-container": "#edeeef",
                        "on-tertiary-container": "#67f4b7",
                        "secondary-fixed": "#acedff",
                        "on-secondary-fixed-variant": "#004e5c",
                        "on-error-container": "#93000a",
                        "on-error": "#ffffff",
                        "surface-bright": "#f8f9fa",
                        "primary-container": "#4f46e5",
                        "surface-container-highest": "#e1e3e4",
                        "secondary-container": "#57dffe",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#0f0069",
                        "inverse-primary": "#c3c0ff",
                        "error": "#ba1a1a",
                        "secondary": "#00687a",
                        "tertiary-fixed-dim": "#4edea3",
                        "on-primary": "#ffffff",
                        "outline-variant": "#c7c4d8",
                        "primary-fixed-dim": "#c3c0ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-shadow {
            box-shadow: 0 32px 64px -12px rgba(53, 37, 205, 0.08);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased selection:bg-primary/20">
<!-- Top Navigation Suppression (Transactional Page) -->
<main class="min-h-screen flex flex-col items-center justify-between py-16 px-8 max-w-md mx-auto relative overflow-hidden">
<!-- Background Editorial Element -->
<div class="absolute top-0 right-0 w-64 h-64 bg-secondary-container/10 rounded-full blur-3xl -z-10 translate-x-1/2 -translate-y-1/2"></div>
<div class="absolute bottom-0 left-0 w-80 h-80 bg-primary-container/5 rounded-full blur-3xl -z-10 -translate-x-1/2 translate-y-1/2"></div>
<!-- Brand Anchor -->
<header class="flex flex-col items-center gap-6 mt-4">
<div class="w-16 h-16 rounded-3xl bg-gradient-to-br from-primary to-primary-container flex items-center justify-center shadow-lg shadow-primary/20 transform rotate-3">
<span class="material-symbols-outlined text-white text-3xl" data-icon="lock" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<div class="text-center">
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-primary">MoneyLog</h1>
<p class="font-label text-on-surface-variant font-medium mt-2 tracking-wide uppercase text-[10px]">The Sovereign Ledger</p>
</div>
</header>
<!-- PIN Status Area -->
<section class="flex flex-col items-center gap-10 w-full mt-12">
<div class="text-center">
<h2 class="font-headline font-semibold text-lg text-on-surface">Enter your PIN</h2>
<p class="text-on-surface-variant text-sm mt-1">Please enter your 4-digit code</p>
</div>
<!-- 4-dot indicator -->
<div class="flex gap-6">
<!-- Dot 1 Filled -->
<div class="w-4 h-4 rounded-full bg-primary ring-4 ring-primary/10"></div>
<!-- Dot 2 Filled -->
<div class="w-4 h-4 rounded-full bg-primary ring-4 ring-primary/10"></div>
<!-- Dot 3 Empty -->
<div class="w-4 h-4 rounded-full bg-surface-container-highest"></div>
<!-- Dot 4 Empty -->
<div class="w-4 h-4 rounded-full bg-surface-container-highest"></div>
</div>
</section>
<!-- Keypad Grid (Bento Style) -->
<section class="w-full grid grid-cols-3 gap-y-4 gap-x-2 mt-auto mb-12">
<!-- Row 1 -->
<button class="aspect-square flex flex-col items-center justify-center rounded-3xl hover:bg-surface-container-low active:scale-95 transition-all group">
<span class="font-headline text-2xl font-bold text-on-surface">1</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center rounded-3xl hover:bg-surface-container-low active:scale-95 transition-all group">
<span class="font-headline text-2xl font-bold text-on-surface">2</span>
<span class="font-label text-[10px] text-on-surface-variant">ABC</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center rounded-3xl hover:bg-surface-container-low active:scale-95 transition-all group">
<span class="font-headline text-2xl font-bold text-on-surface">3</span>
<span class="font-label text-[10px] text-on-surface-variant">DEF</span>
</button>
<!-- Row 2 -->
<button class="aspect-square flex flex-col items-center justify-center rounded-3xl hover:bg-surface-container-low active:scale-95 transition-all group">
<span class="font-headline text-2xl font-bold text-on-surface">4</span>
<span class="font-label text-[10px] text-on-surface-variant">GHI</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center rounded-3xl hover:bg-surface-container-low active:scale-95 transition-all group">
<span class="font-headline text-2xl font-bold text-on-surface">5</span>
<span class="font-label text-[10px] text-on-surface-variant">JKL</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center rounded-3xl hover:bg-surface-container-low active:scale-95 transition-all group">
<span class="font-headline text-2xl font-bold text-on-surface">6</span>
<span class="font-label text-[10px] text-on-surface-variant">MNO</span>
</button>
<!-- Row 3 -->
<button class="aspect-square flex flex-col items-center justify-center rounded-3xl hover:bg-surface-container-low active:scale-95 transition-all group">
<span class="font-headline text-2xl font-bold text-on-surface">7</span>
<span class="font-label text-[10px] text-on-surface-variant">PQRS</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center rounded-3xl hover:bg-surface-container-low active:scale-95 transition-all group">
<span class="font-headline text-2xl font-bold text-on-surface">8</span>
<span class="font-label text-[10px] text-on-surface-variant">TUV</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center rounded-3xl hover:bg-surface-container-low active:scale-95 transition-all group">
<span class="font-headline text-2xl font-bold text-on-surface">9</span>
<span class="font-label text-[10px] text-on-surface-variant">WXYZ</span>
</button>
<!-- Row 4 -->
<button class="aspect-square flex flex-col items-center justify-center rounded-3xl hover:bg-surface-container-low active:scale-95 transition-all group opacity-50 cursor-not-allowed">
<!-- Spacer/Optional Action -->
</button>
<button class="aspect-square flex flex-col items-center justify-center rounded-3xl hover:bg-surface-container-low active:scale-95 transition-all group">
<span class="font-headline text-2xl font-bold text-on-surface">0</span>
</button>
<button class="aspect-square flex flex-col items-center justify-center rounded-3xl hover:bg-error/5 active:scale-95 transition-all group">
<span class="material-symbols-outlined text-on-surface-variant group-hover:text-error transition-colors" data-icon="backspace">backspace</span>
</button>
</section>
<!-- Bottom Action -->
<footer class="w-full">
<button class="w-full py-5 rounded-full bg-surface-container-low border border-outline-variant/10 flex items-center justify-center gap-3 active:scale-[0.98] transition-transform editorial-shadow">
<span class="material-symbols-outlined text-primary" data-icon="fingerprint">fingerprint</span>
<span class="font-body font-semibold text-on-surface text-sm">Unlock with Fingerprint</span>
</button>
<div class="mt-8 text-center">
<button class="text-xs font-label font-bold text-on-surface-variant/60 hover:text-primary transition-colors tracking-widest uppercase">
                    Forgot PIN?
                </button>
</div>
</footer>
</main>
<!-- Modal Mock for Success State (Hidden by default, shown for structure visualization) -->
<div class="fixed inset-0 bg-surface/80 backdrop-blur-md z-[100] flex items-center justify-center opacity-0 pointer-events-none">
<div class="bg-surface-container-lowest p-8 rounded-[2rem] editorial-shadow text-center max-w-xs mx-auto border border-outline-variant/5">
<div class="w-16 h-16 bg-tertiary-container rounded-full flex items-center justify-center mx-auto mb-4">
<span class="material-symbols-outlined text-on-tertiary-container text-3xl" data-icon="check" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<h3 class="font-headline font-bold text-xl text-on-surface">Access Granted</h3>
<p class="text-on-surface-variant text-sm mt-2">Opening your ledger...</p>
</div>
</div>
</body></html>
