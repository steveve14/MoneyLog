<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Transaction - MoneyLog</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">

        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "surface": "#f8f9fa",
                    "on-tertiary-fixed-variant": "#005236",
                    "on-tertiary-fixed": "#002113",
                    "surface-container-high": "#e7e8e9",
                    "on-surface-variant": "#464555",
                    "on-secondary-container": "#006172",
                    "error-container": "#ffdad6",
                    "on-surface": "#191c1d",
                    "on-background": "#191c1d",
                    "primary-fixed": "#e2dfff",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-fixed": "#001f26",
                    "inverse-surface": "#2e3132",
                    "tertiary": "#005338",
                    "background": "#f8f9fa",
                    "surface-variant": "#e1e3e4",
                    "on-primary-fixed-variant": "#3323cc",
                    "tertiary-container": "#006e4b",
                    "on-primary-container": "#dad7ff",
                    "inverse-on-surface": "#f0f1f2",
                    "secondary-fixed-dim": "#4cd7f6",
                    "surface-container-low": "#f3f4f5",
                    "tertiary-fixed": "#6ffbbe",
                    "surface-dim": "#d9dadb",
                    "outline": "#777587",
                    "surface-tint": "#4d44e3",
                    "on-tertiary": "#ffffff",
                    "primary": "#3525cd",
                    "surface-container": "#edeeef",
                    "on-tertiary-container": "#67f4b7",
                    "secondary-fixed": "#acedff",
                    "on-secondary-fixed-variant": "#004e5c",
                    "on-error-container": "#93000a",
                    "on-error": "#ffffff",
                    "surface-bright": "#f8f9fa",
                    "primary-container": "#4f46e5",
                    "surface-container-highest": "#e1e3e4",

                    "on-secondary": "#ffffff",
                    "on-primary-fixed": "#001f26",

                    "error": "#ba1a1a",

            "borderRadius": {
                    "DEFAULT": "0.25rem",

                    "xl": "0.75rem",
                    "2xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }

<style>
        .no-line { border: none !important; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ai-shimmer {
            background: linear-gradient(90deg, rgba(87, 223, 254, 0.1) 0%, rgba(87, 223, 254, 0.2) 50%, rgba(87, 223, 254, 0.1) 100%);
            background-size: 200% 100%;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-slate-900/80 backdrop-blur-lg shadow-sm flex items-center justify-between px-6 h-16">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform text-slate-500 hover:bg-slate-100 p-2 rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-manrope font-semibold text-lg text-slate-700">Add Transaction</h1>
</div>
<div class="flex items-center">
<button class="active:scale-95 transition-transform text-indigo-700 p-2 rounded-full hover:bg-slate-100">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</header>
<main class="pt-20 px-6 max-w-2xl mx-auto">
<!-- Transaction Type Tabs -->
<div class="flex bg-surface-container-low p-1.5 rounded-full mb-8">
<button class="flex-1 py-3 px-6 rounded-full font-headline font-bold text-sm bg-white text-primary shadow-sm transition-all">Expense</button>
<button class="flex-1 py-3 px-6 rounded-full font-headline font-bold text-sm text-on-surface-variant hover:bg-surface-container-high transition-all">Income</button>
</div>
<!-- Editorial Amount Section -->
<section class="mb-10 text-left">
<label class="font-label text-xs font-bold uppercase tracking-widest text-outline mb-2 block">Amount</label>
<div class="flex items-baseline gap-2">
<input class="w-full bg-transparent border-none p-0 font-headline font-bold text-6xl text-on-surface focus:ring-0 placeholder:text-surface-container-highest" placeholder="0" type="text" value="12,000"/>
<span class="font-headline font-bold text-2xl text-on-surface-variant">KRW</span>
</div>
</section>
<!-- Bento Grid Form Content -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Date & Memo Card -->
<div class="space-y-6">
<!-- Date Picker -->
<div class="bg-surface-container-lowest p-6 rounded-2xl">
<label class="font-label text-xs font-bold text-outline mb-4 block">Transaction Date</label>
<div class="flex items-center gap-3 text-on-surface">
<span class="material-symbols-outlined text-primary" data-icon="calendar_today">calendar_today</span>
<input class="bg-transparent border-none p-0 font-body font-medium focus:ring-0 w-full" type="text" value="2026-04-13"/>
</div>
</div>
<!-- Memo Field -->
<div class="bg-surface-container-lowest p-6 rounded-2xl relative overflow-hidden">
<label class="font-label text-xs font-bold text-outline mb-4 block">Memo</label>
<input class="w-full bg-transparent border-none p-0 font-body text-lg focus:ring-0 placeholder:text-surface-container-highest" placeholder="What was this for?" type="text" value="Starbucks Iced Americano"/>
<!-- AI Suggestion Badge -->
<div class="mt-6 inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-secondary-container/20 text-on-secondary-container backdrop-blur-md border border-secondary-container/10">
<span class="material-symbols-outlined text-sm" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="text-[11px] font-bold tracking-tight">AI Recommend: Cafe/Snack</span>
</div>
</div>
</div>
<!-- Category Selection -->
<div class="bg-surface-container-low p-6 rounded-2xl">
<label class="font-label text-xs font-bold text-outline mb-6 block">Category</label>
<div class="grid grid-cols-3 gap-4">
<button class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-2xl bg-surface-container-lowest flex items-center justify-center text-outline group-hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="restaurant">restaurant</span>
</div>
<span class="text-[10px] font-bold text-on-surface-variant">Food</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-2xl bg-surface-container-lowest flex items-center justify-center text-outline group-hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="directions_car">directions_car</span>
</div>
<span class="text-[10px] font-bold text-on-surface-variant">Transport</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-2xl bg-primary-container flex items-center justify-center text-white shadow-lg shadow-primary-container/20">
<span class="material-symbols-outlined" data-icon="coffee" style="font-variation-settings: 'FILL' 1;">coffee</span>
</div>
<span class="text-[10px] font-bold text-primary">Cafe</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-2xl bg-surface-container-lowest flex items-center justify-center text-outline group-hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="palette">palette</span>
</div>
<span class="text-[10px] font-bold text-on-surface-variant">Hobby</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-2xl bg-surface-container-lowest flex items-center justify-center text-outline group-hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="apparel">apparel</span>
</div>
<span class="text-[10px] font-bold text-on-surface-variant">Clothes</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-12 h-12 rounded-2xl bg-surface-container-lowest flex items-center justify-center text-outline group-hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined" data-icon="more_horiz">more_horiz</span>
</div>
<span class="text-[10px] font-bold text-on-surface-variant">Etc.</span>
</button>
</div>
</div>
</div>
<!-- Payment Method -->
<section class="mt-8">
<label class="font-label text-xs font-bold text-outline mb-4 block">Payment Method</label>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-2.5 rounded-full bg-white shadow-sm border border-transparent text-sm font-semibold text-primary">Card</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-low text-sm font-semibold text-on-surface-variant hover:bg-surface-container-high">Cash</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-low text-sm font-semibold text-on-surface-variant hover:bg-surface-container-high">Transfer</button>
<button class="px-5 py-2.5 rounded-full bg-surface-container-low text-sm font-semibold text-on-surface-variant hover:bg-surface-container-high">Other</button>
</div>
</section>
<!-- Dynamic Visualization Placeholder -->
<div class="mt-12 rounded-2xl overflow-hidden aspect-[16/6] bg-surface-container-low relative">
<img alt="Abstract data visualization" class="w-full h-full object-cover opacity-40 mix-blend-multiply" data-alt="abstract wavy fluid gradients in indigo and cyan colors with soft grain texture and editorial modern feel" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDBeA4ii1vmuy2t2zlSMrhbkZ1f91KxELJtDWEF8HwSrt7VEOxxx9lntJ8BCibW-db4mO1bbTRoEPACHKvJhpmyofrMZQ4gEyqCyDK7XmwnZtzk2cEyYZNtnUG5ly4rgEWfZfc-3EF650Gsq4AQ2EaJ6qN4vXTAx_YJpR0n6ocfmE4AGrPd8jRwN9jI9P9UxlZcWkJQoNNmi6fN9_6whlLiaIM5frWr6or1wZGgdY7zneuEs5DpZWJADUZsGOq0ZrvZG9zzISY_0aIa"/>
<div class="absolute inset-0 flex items-center justify-center p-6">
<p class="text-on-surface-variant font-medium text-center text-sm">Logging this will put your 'Cafe' spending at 85% of your monthly budget.</p>
</div>
</div>
</main>
<!-- Save Button Anchor -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-surface via-surface to-transparent">
<button class="w-full max-w-2xl mx-auto block bg-gradient-to-br from-primary to-primary-container text-white font-headline font-bold py-5 rounded-full shadow-2xl shadow-primary/20 active:scale-95 transition-all">
            Save Transaction
        </button>
</div>
<!-- Navigation suppressed for transactional focus per Conflict Resolution Protocol -->
</body></html>
