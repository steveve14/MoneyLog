<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>MoneyLog | Unlock</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-fixed": "#ffeedb",
                        "error": "#9f403d",
                        "secondary-fixed-dim": "#c5d9cb",
                        "surface-container-high": "#e6e9e4",
                        "surface-container-highest": "#e0e4de",
                        "surface-container": "#edeeea",
                        "tertiary": "#695d4f",
                        "inverse-primary": "#e9ffee",
                        "surface-dim": "#d6dbd5",
                        "secondary-dim": "#45574c",
                        "tertiary-container": "#ffeedb",
                        "primary-fixed": "#d2e8d8",
                        "error-container": "#fe8983",
                        "inverse-on-surface": "#9d9d9a",
                        "surface-container-low": "#f4f4f0",
                        "on-surface": "#2f3430",
                        "on-primary-fixed": "#314338",
                        "inverse-surface": "#0d0f0d",
                        "surface-variant": "#e0e4de",
                        "on-tertiary": "#fff8f2",
                        "on-error": "#fff7f6",
                        "on-surface-variant": "#5c605c",
                        "on-secondary-container": "#43564b",
                        "outline-variant": "#afb3ae",
                        "error-dim": "#4e0309",
                        "outline": "#777c77",
                        "primary-container": "#d2e8d8",
                        "on-error-container": "#752121",
                        "on-primary": "#e8fded",
                        "on-secondary-fixed": "#314339",
                        "secondary": "#516358",
                        "primary": "#506356",
                        "on-background": "#2f3430",
                        "primary-dim": "#44574b",
                        "surface": "#faf9f6",
                        "tertiary-fixed-dim": "#f0e0cd",
                        "on-primary-container": "#43564a",
                        "secondary-container": "#d3e8d9",
                        "background": "#faf9f6",
                        "surface-bright": "#faf9f6",
                        "primary-fixed-dim": "#c5daca",
                        "on-tertiary-fixed": "#514639",
                        "on-secondary-fixed-variant": "#4d6055",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed-variant": "#6e6354",
                        "surface-tint": "#506356",
                        "tertiary-dim": "#5c5143",
                        "secondary-fixed": "#d3e8d9",
                        "on-tertiary-container": "#63584a",
                        "on-primary-fixed-variant": "#4d6053",
                        "on-secondary": "#e9feef"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                }
            }
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .signature-glow {
            background: radial-gradient(circle at top right, rgba(80, 99, 86, 0.05) 0%, transparent 60%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-between overflow-hidden signature-glow">
<!-- Top Branding Section -->
<header class="w-full pt-16 px-8 flex flex-col items-center text-center">
<div class="mb-2">
<!-- Icon placeholder with Design System colors -->
<div class="w-12 h-12 bg-primary-container text-on-primary-container rounded-xl flex items-center justify-center mb-6 shadow-sm">
<span class="material-symbols-outlined text-3xl" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
</div>
<h1 class="text-3xl font-extrabold tracking-tighter text-on-surface mb-1">MoneyLog</h1>
<p class="text-[10px] uppercase tracking-[0.2em] font-medium text-on-surface-variant opacity-60">The Sovereign Ledger</p>
</header>
<!-- PIN Entry Display -->
<main class="flex-1 w-full flex flex-col items-center justify-center max-w-md px-8">
<div class="mb-12 text-center">
<p class="text-sm font-medium text-on-surface-variant mb-6">Enter Secure PIN</p>
<div class="flex gap-6 items-center justify-center">
<!-- PIN Dots: Tonal Layering (Surface-variant for empty, Primary for filled) -->
<div class="w-3.5 h-3.5 rounded-full bg-primary shadow-sm ring-4 ring-primary-container"></div>
<div class="w-3.5 h-3.5 rounded-full bg-primary shadow-sm ring-4 ring-primary-container"></div>
<div class="w-3.5 h-3.5 rounded-full bg-surface-container-highest"></div>
<div class="w-3.5 h-3.5 rounded-full bg-surface-container-highest"></div>
</div>
</div>
<!-- Number Pad: Asymmetric/Soft Professional Grid -->
<div class="grid grid-cols-3 gap-y-4 gap-x-8 w-full">
<button class="w-16 h-16 mx-auto flex items-center justify-center text-2xl font-light rounded-full hover:bg-surface-container-low active:scale-90 transition-all duration-200">1</button>
<button class="w-16 h-16 mx-auto flex items-center justify-center text-2xl font-light rounded-full hover:bg-surface-container-low active:scale-90 transition-all duration-200">2</button>
<button class="w-16 h-16 mx-auto flex items-center justify-center text-2xl font-light rounded-full hover:bg-surface-container-low active:scale-90 transition-all duration-200">3</button>
<button class="w-16 h-16 mx-auto flex items-center justify-center text-2xl font-light rounded-full hover:bg-surface-container-low active:scale-90 transition-all duration-200">4</button>
<button class="w-16 h-16 mx-auto flex items-center justify-center text-2xl font-light rounded-full hover:bg-surface-container-low active:scale-90 transition-all duration-200">5</button>
<button class="w-16 h-16 mx-auto flex items-center justify-center text-2xl font-light rounded-full hover:bg-surface-container-low active:scale-90 transition-all duration-200">6</button>
<button class="w-16 h-16 mx-auto flex items-center justify-center text-2xl font-light rounded-full hover:bg-surface-container-low active:scale-90 transition-all duration-200">7</button>
<button class="w-16 h-16 mx-auto flex items-center justify-center text-2xl font-light rounded-full hover:bg-surface-container-low active:scale-90 transition-all duration-200">8</button>
<button class="w-16 h-16 mx-auto flex items-center justify-center text-2xl font-light rounded-full hover:bg-surface-container-low active:scale-90 transition-all duration-200">9</button>
<button class="w-16 h-16 mx-auto flex items-center justify-center rounded-full text-on-surface-variant hover:text-error transition-colors">
<span class="text-xs uppercase tracking-widest font-bold">Clear</span>
</button>
<button class="w-16 h-16 mx-auto flex items-center justify-center text-2xl font-light rounded-full hover:bg-surface-container-low active:scale-90 transition-all duration-200">0</button>
<button class="w-16 h-16 mx-auto flex items-center justify-center rounded-full text-on-surface-variant active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl" data-icon="backspace">backspace</span>
</button>
</div>
</main>
<!-- Bottom Action Section -->
<footer class="w-full pb-12 px-8 flex flex-col items-center">
<!-- Unlock with Fingerprint: Glass-like secondary CTA -->
<button class="group flex items-center gap-3 px-8 py-4 rounded-full bg-surface-container-low hover:bg-surface-container border border-outline-variant/10 transition-all duration-300">
<span class="material-symbols-outlined text-primary group-active:scale-110 transition-transform" data-icon="fingerprint" style="font-variation-settings: 'FILL' 0, 'wght' 300;">fingerprint</span>
<span class="text-sm font-semibold text-on-surface-variant tracking-tight">Unlock with Fingerprint</span>
</button>
<button class="mt-8 text-[11px] font-bold uppercase tracking-[0.1em] text-primary/60 hover:text-primary transition-colors">
            Forgot PIN?
        </button>
</footer>
<!-- Decorative Elements (The Financial Sanctuary Vibe) -->
<div class="fixed -top-24 -left-24 w-64 h-64 bg-secondary-container/20 rounded-full blur-[80px] pointer-events-none"></div>
<div class="fixed -bottom-32 -right-32 w-80 h-80 bg-primary-container/30 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
